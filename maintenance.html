<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#05050c; color:#f8fafc; font-family:Inter,sans-serif; }
        .card { max-width:560px; width:100%; padding:2rem; text-align:center; background:rgba(15,23,42,.95); border:1px solid rgba(148,163,184,.12); border-radius:24px; box-shadow:0 40px 120px rgba(15,23,42,.5); }
        .card h1 { margin:0 0 .75rem; font-size:2rem; letter-spacing:.04em; }
        .card p { margin:.75rem 0 0; color:rgba(241,245,249,.75); line-height:1.7; }
        .card small { display:block; margin-top:1.5rem; color:rgba(148,163,184,.75); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Site en maintenance</h1>
        <p>Nous effectuons une maintenance temporaire. Nous serons bientôt de retour. Merci de votre patience.</p>
    </div>
</body>
</html>
